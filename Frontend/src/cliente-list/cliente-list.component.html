<section class="modulo">
  <div class="modulo-cabecera">
    <h2>Clientes</h2>
    <a routerLink="/clientes/nuevo" class="boton-primario">+ Nuevo cliente</a>
  </div>

  <p class="mensaje-error" *ngIf="error">{{ error }}</p>

  <div class="estado" *ngIf="cargando">Cargando clientes…</div>

  <div class="estado" *ngIf="!cargando && clientes.length === 0 && !error">
    Aún no hay clientes registrados.
  </div>

  <table class="tabla" *ngIf="!cargando && clientes.length > 0">
    <thead>
      <tr>
        <th>Código</th>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cliente of clientes">
        <td>{{ cliente.codigoCliente }}</td>
        <td>{{ cliente.nombreCliente }}</td>
        <td>{{ cliente.direccionCliente }}</td>
        <td>{{ cliente.telefono }}</td>
        <td class="acciones">
          <a [routerLink]="['/clientes', cliente.codigoCliente, 'editar']">Editar</a>
          <button type="button" (click)="eliminar(cliente.codigoCliente)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</section>
